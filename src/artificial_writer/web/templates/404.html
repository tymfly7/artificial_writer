<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 &middot; Artificial Writer</title>
  <!-- Apply the saved/preferred theme before first paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("aw:theme");
        if (!t) t = (window.matchMedia
          && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { /* localStorage blocked; default light applies */ }
    })();
  </script>
  <style>
    :root {
      --bg: #f7f5dd; --accent: #9bdeac; --on-accent: #173e27; --ink: #2b2b2b;
      --muted: #666; --tags: #999; --card: #ffffff; --line: #ece9c8;
      --shadow: rgba(0,0,0,.12);
    }
    html[data-theme="dark"] {
      --bg: #16171c; --accent: #3f8f5c; --on-accent: #eafff1; --ink: #e7e5d8;
      --muted: #9aa0a6; --tags: #777; --card: #23252c; --line: #3b3e46;
      --shadow: rgba(0,0,0,.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.6;
      transition: background .2s ease, color .2s ease;
    }
    main { max-width: 640px; margin: 0 auto; padding: 3rem 1.25rem 4rem; text-align: center; }
    h1 { font-size: 4rem; margin: 0; letter-spacing: .05em; }
    h2 { margin: .25rem 0 1rem; }
    p.sub { margin-top: 0; color: var(--muted); }
    .gif {
      max-width: 100%; width: 360px; border-radius: 12px; margin: 1.5rem auto;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .gif-credit { font-size: .75rem; color: var(--tags); margin-top: -.75rem; }
    a.home {
      display: inline-block; margin-top: 1.5rem; padding: .7rem 1.25rem;
      background: var(--accent); border: 1px solid var(--accent); border-radius: 8px;
      color: var(--on-accent); text-decoration: none; font-weight: 600;
    }
    a.home:hover { filter: brightness(.96); }

    /* ---- Dark / light theme toggle ----------------------------------- */
    .theme-toggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 100;
      width: 2.5rem; height: 2.5rem; border-radius: 999px;
      border: 1px solid var(--line); background: var(--card); color: var(--ink);
      cursor: pointer; font-size: 1.15rem; line-height: 1; padding: 0;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .theme-toggle:hover { filter: brightness(.97); }
  </style>
</head>
<body>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
  <main>
    <h1>404</h1>
    <h2>We looked everywhere &mdash; couldn't find a thing.</h2>
    <p class="sub">Looks like you hit a wall, bro. This page doesn't exist (or wandered off).</p>

    <img class="gif" src="https://media.giphy.com/media/5XvhZSJHr8wOk/giphy.gif"
         alt="Cartoon character running straight into a wall" loading="lazy" />
    <p class="gif-credit">via GIPHY</p>

    <div>
      <a class="home" href="/">Take me back home</a>
    </div>
  </main>

  <script>
    // ---- Dark / light theme toggle (no page reload) -----------------------
    (function () {
      const KEY = "aw:theme";
      const root = document.documentElement;
      const btn = document.getElementById("theme-toggle");
      function render(theme) {
        root.setAttribute("data-theme", theme);
        // Sun shown while dark (click → light); half-moon while light (click → dark).
        btn.textContent = theme === "dark" ? "☀️" : "🌗";
        btn.setAttribute("aria-pressed", String(theme === "dark"));
        btn.title = theme === "dark" ? "Switch to light theme" : "Switch to dark theme";
      }
      let current = root.getAttribute("data-theme") || "light";
      render(current);
      btn.onclick = () => {
        current = current === "dark" ? "light" : "dark";
        try { localStorage.setItem(KEY, current); } catch (_) { /* quota/blocked */ }
        render(current);
      };
    })();
  </script>
</body>
</html>
